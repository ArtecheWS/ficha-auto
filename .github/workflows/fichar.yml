name: Fichaje automatico Ficha.Work

on:
  schedule:
      - cron: '0 7 * * 1-5'   # 9:00 hora Madrid (UTC+2 en verano)
          - cron: '0 15 * * 1-5'  # 17:00 hora Madrid (UTC+2 en verano)
            workflow_dispatch:         # permite ejecutar manualmente desde GitHub

            jobs:
              fichar:
                  runs-on: ubuntu-latest
                      steps:
                            - name: Checkout codigo
                                    uses: actions/checkout@v4

                                          - name: Usar Node.js
                                                  uses: actions/setup-node@v4
                                                          with:
                                                                    node-version: '18'

                                                                          - name: Ejecutar fichaje
                                                                                  env:
                                                                                            REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
                                                                                                    run: node fichawork.js
